name: Publish to npm

# Publishes @komaa/livekit-msteams-bridge when you push a version tag (e.g. `v0.2.0`)
# or publish a GitHub Release. prepublishOnly runs typecheck + tests + build, so what
# ships is always freshly built from the tagged source.
on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # enables npm provenance (supply-chain attestation); needs a public repo

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci

      # Safety: on a tag push, the tag must equal the package.json version (e.g. tag v0.2.0 == "0.8.0").
      - name: Tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$PKG" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi

      # publishConfig.access=public is set; prepublishOnly runs typecheck + tests + build.
      - name: Upgrade npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      # OIDC trusted publishing: no NPM_TOKEN. Requires a trusted publisher configured for
      # this package on npmjs.com (komaa-com / this repo / publish.yml). Provenance is
      # generated automatically, so --provenance is no longer passed.
      - name: Publish
        run: npm publish --access public
